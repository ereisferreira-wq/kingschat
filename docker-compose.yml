version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-kmenu}
      POSTGRES_PASSWORD: ${DB_PASS:-change-me-in-production}
      POSTGRES_DB: ${DB_NAME:-kmenu_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kmenu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kmenu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-in-production}
    volumes:
      - redis_data:/data
    networks:
      - kmenu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-kmenu}
      DB_PASS: ${DB_PASS:-change-me-in-production}
      DB_NAME: ${DB_NAME:-kmenu_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FRONTEND_URL: ${FRONTEND_URL:-https://example.com}
      BACKEND_URL: ${BACKEND_URL:-https://api.example.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kmenu.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-3.5-turbo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kmenu-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      VITE_API_URL: ${BACKEND_URL:-https://api.example.com}
    depends_on:
      - backend
    networks:
      - kmenu-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kmenu-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
